name: pytest

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # CPU runners: install lightweight unit/lint deps only. Do not pull
          # nvidia-curobo (Git/CUDA) — unit tests mock planning and do not need it.
          python -m pip install "numpy>=1.24" "pyyaml>=6.0" "pytest>=7.4,<9" "ruff>=0.4"
          python -m pip install --no-deps -e .

      - name: Unit tests and lint
        env:
          SPARK_REPO_ROOT: ${{ github.workspace }}
          # run_verification.sh defaults to /usr/bin/python3 (system). Point it
          # at the setup-python interpreter where pytest/ruff were installed.
          SPARK_PYTEST_PYTHON: ${{ env.pythonLocation }}/bin/python
        run: |
          ./scripts/run_verification.sh ci
